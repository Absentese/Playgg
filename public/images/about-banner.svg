<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="480" height="300" rx="16" fill="url(#bg)"/>
  <circle cx="120" cy="80" r="60" fill="#a855f7" opacity="0.25" filter="url(#blur)"/>
  <circle cx="360" cy="200" r="70" fill="#22d3ee" opacity="0.2" filter="url(#blur)"/>
  <g opacity="0.12" stroke="#818cf8" stroke-width="1">
    <path d="M0 50h480M0 100h480M0 150h480M0 200h480M0 250h480"/>
    <path d="M60 0v300M120 0v300M180 0v300M240 0v300M300 0v300M360 0v300M420 0v300"/>
  </g>
  <!-- Gamepad -->
  <g transform="translate(140 95)">
    <rect x="0" y="28" width="200" height="72" rx="36" fill="#0f0a1a" stroke="url(#glow)" stroke-width="2.5"/>
    <circle cx="52" cy="64" r="14" fill="none" stroke="#a855f7" stroke-width="3"/>
    <circle cx="148" cy="64" r="14" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <path d="M88 48v32M72 64h32" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <circle cx="168" cy="48" r="6" fill="#a855f7"/>
    <circle cx="184" cy="40" r="6" fill="#22d3ee"/>
    <circle cx="200" cy="48" r="6" fill="#a855f7"/>
    <circle cx="184" cy="56" r="6" fill="#6366f1"/>
  </g>
  <!-- Digital key cards -->
  <g transform="translate(48 168)">
    <rect width="88" height="52" rx="10" fill="rgba(99,102,241,0.35)" stroke="#818cf8" stroke-width="1.5"/>
    <text x="44" y="22" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0">GAME KEY</text>
    <text x="44" y="38" text-anchor="middle" font-family="monospace" font-size="9" fill="#22d3ee">XXXX-XXXX</text>
  </g>
  <g transform="translate(320 42)">
    <rect width="88" height="52" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="44" y="22" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0">STEAM</text>
    <text x="44" y="38" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="9" fill="#94a3b8">+ 10;0=A</text>
  </g>
  <!-- Headset hint -->
  <path d="M368 200c0-22 14-38 36-38s36 16 36 38v18h-12v-18c0-14-8-24-24-24s-24 10-24 24v18h-12v-18z" fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="404" cy="218" r="8" fill="#a855f7" opacity="0.8"/>
</svg>
